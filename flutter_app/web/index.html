<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CartelHooD - Sokakların Hakimi">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CartelHooD">
  <meta name="theme-color" content="#0b1220">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CartelHooD</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a14;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow: hidden;
    }

    #flutter-app-container {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    /* Masaüstünde telefon çerçevesi */
    @media (min-width: 500px) {
      body {
        align-items: center;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(251,191,36,0.04) 0%, transparent 60%),
          #050a14;
      }
      #flutter-app-container {
        height: min(100vh, 900px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.08);
      }
    }

    flutter-view, flt-glass-pane, flt-scene-host {
      border-radius: inherit;
    }
  </style>
</head>
<body>
  <div id="flutter-app-container">
    <script src="flutter_bootstrap.js" async></script>
  </div>
</body>
</html>
